name: Verify Syntax Pipeline

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repo code
      uses: actions/checkout@v4

    - name: Set up Python environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl pytesseract Pillow

    - name: Lint check for compilation bugs
      run: |
        # This compiles the python code to check for typos or formatting bugs without executing the local image logic
        python -m compileall src/ run_pipeline.py
